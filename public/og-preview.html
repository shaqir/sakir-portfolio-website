<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', 'Helvetica Neue', system-ui, sans-serif;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #000000, #111111);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
  }

  /* Gradient orbs */
  .card::before {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(41, 151, 255, 0.12) 0%, transparent 70%);
    bottom: -200px;
    left: -150px;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(191, 90, 242, 0.1) 0%, transparent 70%);
    top: -150px;
    right: -100px;
  }

  /* Top accent line */
  .accent-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #2997ff, #bf5af2);
  }
  .accent-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #2997ff, #bf5af2);
  }

  .content { position: relative; z-index: 1; }

  .label {
    color: #86868b;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .name {
    color: #f5f5f7;
    font-size: 62px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .title {
    color: #2997ff;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 24px;
  }

  .description {
    color: #86868b;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 36px;
  }

  .pills {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }

  .pill {
    padding: 10px 24px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #f5f5f7;
    font-size: 15px;
    font-weight: 600;
  }

  .url {
    color: #6e6e73;
    font-size: 17px;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-top"></div>
    <div class="accent-bottom"></div>
    <div class="content">
      <div class="label">Portfolio</div>
      <div class="name">Sakir Saiyed</div>
      <div class="title">AI Engineer & Senior Mobile Developer</div>
      <div class="description">10+ years shipping production mobile apps. Building AI-powered systems for healthcare, fintech, and IoT.</div>
      <div class="pills">
        <span class="pill">10+ Years</span>
        <span class="pill">30+ Apps</span>
        <span class="pill">iOS · AI · Flutter</span>
      </div>
      <div class="url">sakiralisaiyed.com</div>
    </div>
  </div>
</body>
</html>
