<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf5af2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#bf5af2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle gradient orbs -->
  <circle cx="200" cy="500" r="350" fill="url(#orb1)"/>
  <circle cx="1050" cy="120" r="300" fill="url(#orb2)"/>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Content area -->
  <!-- Small label -->
  <text x="100" y="200" fill="#86868b" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="18" font-weight="500" letter-spacing="3">
    PORTFOLIO
  </text>

  <!-- Name -->
  <text x="100" y="270" fill="#f5f5f7" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="64" font-weight="700">
    Sakir Saiyed
  </text>

  <!-- Title -->
  <text x="100" y="330" fill="#2997ff" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="30" font-weight="600">
    AI Engineer &amp; Senior Mobile Developer
  </text>

  <!-- Description -->
  <text x="100" y="390" fill="#86868b" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="22" font-weight="400">
    10+ years shipping production mobile apps. Building AI-powered systems
  </text>
  <text x="100" y="420" fill="#86868b" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="22" font-weight="400">
    for healthcare, fintech, and IoT.
  </text>

  <!-- Stat pills -->
  <!-- Pill 1 -->
  <rect x="100" y="460" width="130" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="165" y="488" fill="#f5f5f7" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">
    10+ Years
  </text>

  <!-- Pill 2 -->
  <rect x="250" y="460" width="120" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="310" y="488" fill="#f5f5f7" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">
    30+ Apps
  </text>

  <!-- Pill 3 -->
  <rect x="390" y="460" width="170" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="475" y="488" fill="#f5f5f7" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">
    iOS · AI · Flutter
  </text>

  <!-- Website URL -->
  <text x="100" y="570" fill="#6e6e73" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, Plus Jakarta Sans, Helvetica Neue, system-ui, sans-serif" font-size="18" font-weight="400">
    sakiralisaiyed.com
  </text>

  <!-- Bottom border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
